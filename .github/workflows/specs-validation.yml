name: Specs Validation

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work

jobs:
  validate-specs:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install YAML parser dependency
        run: npm install --no-save yaml

      - name: Validate specs
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: bash scripts/validate-specs.sh
