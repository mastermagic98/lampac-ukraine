paths:
  /api/lampac/movie/{tmdb_id}:
    get:
      operationId: getMovieByTmdbId
      tags: [Movie]
      summary: Отримати джерела для фільму за TMDB ID
      parameters:
        - in: path
          name: tmdb_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: include_inactive
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Успішно
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/MovieExportResponse"
        "404":
          description: Контент не знайдено
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/ErrorResponse"
        "500":
          description: Внутрішня помилка
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/ErrorResponse"

  /api/lampac/movie/imdb/{imdb_id}:
    get:
      operationId: getMovieByImdbId
      tags: [Movie]
      summary: Отримати джерела для фільму за IMDB ID
      parameters:
        - in: path
          name: imdb_id
          required: true
          schema:
            type: string
            pattern: "^tt[0-9]{6,12}$"
        - in: query
          name: include_inactive
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Успішно
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/MovieExportResponse"
        "404":
          description: Контент не знайдено
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/ErrorResponse"
        "500":
          description: Внутрішня помилка
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/ErrorResponse"

  /api/lampac/series/{tmdb_id}:
    get:
      operationId: getSeriesByTmdbId
      tags: [Series]
      summary: Отримати повну структуру серіалу (сезони/епізоди + джерела)
      parameters:
        - in: path
          name: tmdb_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: include_inactive
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Успішно
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/SeriesExportResponse"
        "404":
          description: Серіал не знайдено
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/ErrorResponse"

  /api/lampac/series/{tmdb_id}/season/{season}/episode/{episode}:
    get:
      operationId: getSeriesEpisodeByTmdbId
      tags: [Series]
      summary: Отримати джерела для конкретного епізоду
      parameters:
        - in: path
          name: tmdb_id
          required: true
          schema:
            type: integer
            format: int64
        - in: path
          name: season
          required: true
          schema:
            type: integer
            minimum: 1
        - in: path
          name: episode
          required: true
          schema:
            type: integer
            minimum: 1
        - in: query
          name: include_inactive
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Успішно
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/EpisodeExportResponse"
        "404":
          description: Епізод або контент не знайдено
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/ErrorResponse"

  /api/lampac/enrich/by-tmdb:
    post:
      operationId: startEnrichmentByTmdbId
      tags: [Enrichment]
      summary: Запустити enrichment за TMDB ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/EnrichByTmdbRequest"
      responses:
        "202":
          description: Задача прийнята
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/EnrichAcceptedResponse"
        "400":
          description: Некоректний запит
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/ErrorResponse"

  /api/lampac/enrich/jobs/{job_id}:
    get:
      operationId: getEnrichmentJobStatus
      tags: [Enrichment]
      summary: Статус enrichment-задачі
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Статус задачі
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/EnrichJobStatusResponse"
        "404":
          description: Задачу не знайдено
          content:
            application/json:
              schema:
                $ref: "./openapi-lampac-schemas-v1.yaml#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
